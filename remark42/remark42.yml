# Remark42 configuration for the mywebspace project.
# Secrets (ADMIN_PASS, SECRET, auth provider keys) are injected via Railway
# environment variables and referenced here as ${VAR}.

DEBUG: false
SITE_ID: mywebspace
SITE_URL: https://j-bot.net

# Remark42 binds to $PORT on Railway (defaults to 8081 locally).
PORT: 8081

# Backend store – use SQLite locally, PostgreSQL on Railway via DATABASE_URL.
STORE:
  TYPE: bolt
  PATH: /srv/var/db
  # For Railway PostgreSQL, override with:
  # TYPE: postgres
  # URL: ${DATABASE_URL}

ADMIN_SHARED_EMAIL: ${ADMIN_SHARED_EMAIL}
ADMIN_SHARED_ID: ${ADMIN_SHARED_ID}

AUTH_GOOGLE_CID: ${AUTH_GOOGLE_CID}
AUTH_GOOGLE_CSEC: ${AUTH_GOOGLE_CSEC}
AUTH_GITHUB_CID: ${AUTH_GITHUB_CID}
AUTH_GITHUB_CSEC: ${AUTH_GITHUB_CSEC}

SECRET: ${SECRET}
ADMIN_PASS: ${ADMIN_PASS}

# Where Remark42 is exposed to the browser (used by embed.js on the site).
# Set this to the Railway public URL of the remark42-comments service.
SHARE_URL: ${REMARK42_PUBLIC_URL}
EMBED_URL: ${REMARK42_PUBLIC_URL}/web/embed.js

# Restrict comments to the guestbook page(s) only.
TRUST_PROXY: true
MAX_COMMENT_SIZE: 4000
READONLY_AGE: 0

# UI.
ADMIN_EDIT: true
SIMPLE_VIEW: true
