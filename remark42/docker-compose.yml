# Reference docker-compose for running Remark42 locally with Bolt storage.
# On Railway, the service is built directly from ./Dockerfile and uses the
# Railway PostgreSQL add-on instead (see README.md).

services:
  remark42:
    build: .
    image: mywebspace-remark42:local
    container_name: mywebspace-remark42
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override the Bolt path used in local testing.
      STORE_TYPE: bolt
      STORE_PATH: /srv/var/db
      PORT: "8081"
    ports:
      - "8081:8081"
    volumes:
      - remark42-data:/srv/var

volumes:
  remark42-data:
